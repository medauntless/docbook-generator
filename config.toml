[book]
theme = "light"
page_size = "A4"
body_font = "\"Source Serif 4\", \"Libre Baskerville\", Georgia, serif"
code_font = "\"JetBrains Mono\", \"Fira Code\", monospace"
font_size = "10.8pt"
header = true
footer = true

[book.margins]
top = "22mm"
right = "20mm"
bottom = "24mm"
left = "22mm"

[rendering]
syntax_highlighting = true
line_numbers = false
image_compression = 90

[callouts.colors]
rule = "#1d8f57"
warning = "#c93b3b"
key_insight = "#2563eb"
nomenclature = "#d97706"
definition = "#7c3aed"
tip = "#0891b2"
