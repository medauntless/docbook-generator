<nav class="toc">
  <h1>Table of Contents</h1>
  <ol>
    {% for entry in toc %}
      <li>
        <a href="#{{ entry.anchor }}">{{ entry.title }}</a>
        {% if entry.children %}
          <ol>
            {% for child in entry.children %}
              <li class="toc-level-{{ child.level }}"><a href="#{{ child.anchor }}">{{ child.title }}</a></li>
            {% endfor %}
          </ol>
        {% endif %}
      </li>
    {% endfor %}
  </ol>
</nav>
