<!doctype html>
<html lang="{{ metadata.language }}">
<head>
  <meta charset="utf-8">
  <title>{{ metadata.title }}</title>
  <meta name="author" content="{{ metadata.author }}">
  <meta name="subject" content="{{ metadata.subject }}">
  <meta name="keywords" content="{{ metadata.keywords | join(', ') }}">
  <style>{{ css | safe }}</style>
</head>
<body>
  {% include "cover.html" %}
  <section class="copyright-page">
    <h1>Copyright</h1>
    <p>This book was generated for personal study from saved documentation pages.</p>
    <p>Generated by {{ metadata.creator }}.</p>
  </section>
  {% include "toc.html" %}
  {% for chapter in chapters %}
    {% include "chapter.html" %}
  {% endfor %}
</body>
</html>
